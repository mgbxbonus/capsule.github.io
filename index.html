<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Time Capsule — Base</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js" integrity="sha512-hG6tLc9q8bFM5OQASDTJTJJg/wn8PP0PcayE3I2H1972/F7ktiSvWutAuQIkt4QUTIhiaFEnkrKea7XHUv1ugg==" crossorigin="anonymous"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #5b6af0;
    --accent-glow: rgba(91,106,240,0.15);
    --locked: #2a1f4e;
    --unlocked: #0f2a1f;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --green: #3ddc84;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0 16px 80px;
  }

  header {
    max-width: 680px;
    margin: 0 auto;
    padding: 48px 0 40px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .logo span { color: var(--accent); }

  h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  h1 em {
    font-style: normal;
    color: var(--accent);
  }

  .tagline {
    margin-top: 12px;
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
  }

  .connect-bar {
    max-width: 680px;
    margin: 28px auto 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    border: none;
    cursor: pointer;
    padding: 10px 20px;
    border-radius: 6px;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }

  .wallet-addr {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--green);
    background: rgba(61,220,132,0.08);
    padding: 6px 12px;
    border-radius: 4px;
  }

  main { max-width: 680px; margin: 40px auto 0; }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 40px;
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 300;
    padding: 14px;
    resize: vertical;
    min-height: 100px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.6;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .date-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    margin-top: 12px;
    align-items: end;
  }

  .field-group label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }

  input[type="datetime-local"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
    color-scheme: dark;
  }
  input[type="datetime-local"]:focus { border-color: var(--accent); }

  .char-count {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    margin-top: 6px;
  }

  .status {
    margin-top: 14px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    min-height: 18px;
  }
  .status.ok { color: var(--green); }
  .status.err { color: #f07070; }

  /* Capsules list */
  .read-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    margin-bottom: 24px;
    align-items: end;
  }

  input[type="number"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="number"]:focus { border-color: var(--accent); }

  .capsule-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }

  .capsule-card.locked {
    border-color: var(--locked);
    background: #0e0c18;
  }

  .capsule-card.unlocked {
    border-color: #1a3a2a;
    background: #0b160f;
  }

  .capsule-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .capsule-card.locked::before { background: linear-gradient(90deg, var(--accent), transparent); }
  .capsule-card.unlocked::before { background: linear-gradient(90deg, var(--green), transparent); }

  .capsule-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .capsule-id {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
  }

  .badge.locked { background: rgba(91,106,240,0.15); color: var(--accent); }
  .badge.unlocked { background: rgba(61,220,132,0.1); color: var(--green); }

  .capsule-message {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 14px;
  }

  .locked-placeholder {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
  }

  .capsule-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    flex-wrap: wrap;
    gap: 8px;
  }

  .countdown {
    color: var(--accent);
    font-size: 12px;
  }

  .total-badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .total-badge span { color: var(--text); }

  .network-warn {
    background: rgba(240,112,112,0.08);
    border: 1px solid rgba(240,112,112,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 12px;
    color: #f07070;
    font-family: 'Space Mono', monospace;
    margin-bottom: 20px;
    display: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo">On-chain · <span>Base Mainnet</span> · 0x36A9...08e69</div>
  <h1>Time<br><em>Capsule</em></h1>
  <p class="tagline">Write a message. Set a date. It stays sealed until then — forever on Base.</p>
  <div class="connect-bar">
    <button class="btn btn-primary" id="connectBtn">Connect Wallet</button>
    <div class="wallet-addr" id="walletAddr" style="display:none"></div>
  </div>
</header>

<main>
  <div class="network-warn" id="networkWarn">⚠ Switch to Base Mainnet (chain 8453)</div>

  <!-- Create -->
  <div class="section-label">— Create a capsule</div>
  <div class="form-card">
    <textarea id="msgInput" placeholder="Write your message to the future..." maxlength="1000"></textarea>
    <div class="char-count"><span id="charCount">0</span> / 1000</div>
    <div class="date-row">
      <div class="field-group">
        <label>Unlock date</label>
        <input type="datetime-local" id="dateInput">
      </div>
      <button class="btn btn-primary" id="createBtn" disabled>Seal →</button>
    </div>
    <div class="status" id="createStatus"></div>
  </div>

  <!-- Read -->
  <div class="section-label">— Read a capsule</div>
  <div class="read-row">
    <div class="field-group" style="flex:1">
      <label>Capsule ID</label>
      <input type="number" id="capsuleIdInput" placeholder="0" min="0">
    </div>
    <button class="btn btn-ghost" id="readBtn">Read</button>
  </div>

  <div class="total-badge" id="totalBadge"></div>
  <div id="capsuleResult"></div>
</main>

<script>
// --------------------------------------------------------------
//  CONTRACT DETAILS (Base Mainnet verified proxy / contract)
// --------------------------------------------------------------
const CONTRACT = "0x36A9BFfc6116030459C7E9EE69d559f74BA08e69";
const ABI = [
  "function createCapsule(string calldata _message, uint256 _unlockTime) external returns (uint256)",
  "function readCapsule(uint256 _id) external view returns (address author, string memory message, uint256 unlockTime)",
  "function timeUntilUnlock(uint256 _id) external view returns (uint256)",
  "function totalCapsules() external view returns (uint256)",
  "event CapsuleCreated(uint256 indexed id, address indexed author, uint256 unlockTime)"
];
const BASE_CHAIN_ID = 8453;
const BASE_CHAIN_HEX = "0x2105";

// Global state
let provider = null;
let signer = null;
let signerContract = null;      // write-enabled contract
let readProvider = null;        // public provider for reads
let readOnlyContract = null;    // read-only contract

// DOM elements
const connectBtn = document.getElementById('connectBtn');
const walletAddrSpan = document.getElementById('walletAddr');
const createBtn = document.getElementById('createBtn');
const msgInput = document.getElementById('msgInput');
const dateInput = document.getElementById('dateInput');
const charCountSpan = document.getElementById('charCount');
const createStatusDiv = document.getElementById('createStatus');
const readBtn = document.getElementById('readBtn');
const capsuleIdInput = document.getElementById('capsuleIdInput');
const capsuleResultDiv = document.getElementById('capsuleResult');
const totalBadgeSpan = document.getElementById('totalBadge');
const networkWarnDiv = document.getElementById('networkWarn');

// Helper: format status
function setStatus(elementId, msg, type = '') {
  const el = document.getElementById(elementId);
  if (!el) return;
  el.textContent = msg;
  el.className = 'status ' + type;
}

// Simple escape HTML
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
}

// Load total capsules using read-only provider
async function loadTotalCapsules() {
  if (!readOnlyContract) {
    // fallback: create read-only provider if missing
    if (!readProvider) {
      try {
        readProvider = new ethers.JsonRpcProvider('https://mainnet.base.org');
        readOnlyContract = new ethers.Contract(CONTRACT, ABI, readProvider);
      } catch (e) {
        console.warn("Cannot init read provider", e);
        return;
      }
    } else {
      readOnlyContract = new ethers.Contract(CONTRACT, ABI, readProvider);
    }
  }
  try {
    const total = await readOnlyContract.totalCapsules();
    totalBadgeSpan.innerHTML = `Total capsules sealed: <span>${total.toString()}</span>`;
  } catch (err) {
    console.warn("Failed to load total capsules", err);
    totalBadgeSpan.innerHTML = `Total capsules sealed: <span>—</span>`;
  }
}

// Initialize read-only provider on page load (always works, no wallet needed)
async function initReadOnly() {
  try {
    readProvider = new ethers.JsonRpcProvider('https://mainnet.base.org');
    readOnlyContract = new ethers.Contract(CONTRACT, ABI, readProvider);
    await loadTotalCapsules();
  } catch (err) {
    console.error("Read-only init error", err);
  }
}

// Switch to Base chain helper
async function switchToBase() {
  if (!window.ethereum) return false;
  try {
    await window.ethereum.request({
      method: 'wallet_switchEthereumChain',
      params: [{ chainId: BASE_CHAIN_HEX }]
    });
    networkWarnDiv.style.display = 'none';
    return true;
  } catch (switchError) {
    // If chain not added, request add
    if (switchError.code === 4902) {
      try {
        await window.ethereum.request({
          method: 'wallet_addEthereumChain',
          params: [{
            chainId: BASE_CHAIN_HEX,
            chainName: 'Base Mainnet',
            nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
            rpcUrls: ['https://mainnet.base.org'],
            blockExplorerUrls: ['https://basescan.org']
          }]
        });
        networkWarnDiv.style.display = 'none';
        return true;
      } catch (addErr) {
        console.error("Add chain error", addErr);
        return false;
      }
    } else {
      console.error("Switch error", switchError);
      return false;
    }
  }
}

// Connect wallet & setup signer
async function connectWallet() {
  if (!window.ethereum) {
    setStatus('createStatus', 'MetaMask not detected. Install MetaMask.', 'err');
    alert('Please install MetaMask to use Time Capsule.');
    return false;
  }

  try {
    // Request accounts
    const ethProvider = new ethers.BrowserProvider(window.ethereum);
    await ethProvider.send("eth_requestAccounts", []);
    const currentSigner = await ethProvider.getSigner();
    const address = await currentSigner.getAddress();

    // Check network
    const network = await ethProvider.getNetwork();
    const chainId = Number(network.chainId);

    if (chainId !== BASE_CHAIN_ID) {
      networkWarnDiv.style.display = 'block';
      const switched = await switchToBase();
      if (!switched) {
        setStatus('createStatus', 'Please switch to Base Mainnet manually.', 'err');
        return false;
      }
      // After switch, we need to re-fetch signer because network changed
      const newProvider = new ethers.BrowserProvider(window.ethereum);
      const newSigner = await newProvider.getSigner();
      const newNetwork = await newProvider.getNetwork();
      if (Number(newNetwork.chainId) !== BASE_CHAIN_ID) {
        setStatus('createStatus', 'Wrong network. Switch to Base.', 'err');
        return false;
      }
      provider = newProvider;
      signer = newSigner;
    } else {
      provider = ethProvider;
      signer = currentSigner;
      networkWarnDiv.style.display = 'none';
    }

    // Create signer contract
    signerContract = new ethers.Contract(CONTRACT, ABI, signer);
    
    // Update UI
    const shortAddr = address.slice(0,6) + '...' + address.slice(-4);
    walletAddrSpan.textContent = shortAddr;
    walletAddrSpan.style.display = 'block';
    connectBtn.style.display = 'none';
    createBtn.disabled = false;

    // Also update read-only contract with same provider for consistency but keep read-only fallback
    readOnlyContract = new ethers.Contract(CONTRACT, ABI, provider);
    // Reload total capsules
    await loadTotalCapsules();
    
    setStatus('createStatus', 'Wallet connected ✓ ready to seal', 'ok');
    
    // Listen to account / chain changes
    window.ethereum.on('accountsChanged', () => window.location.reload());
    window.ethereum.on('chainChanged', () => window.location.reload());
    
    return true;
  } catch (err) {
    console.error("Connection error", err);
    setStatus('createStatus', `Connection failed: ${err.message?.slice(0, 80) || 'unknown error'}`, 'err');
    return false;
  }
}

// Create capsule logic
async function createCapsule() {
  if (!signerContract) {
    setStatus('createStatus', 'Wallet not connected. Connect first.', 'err');
    return;
  }

  const message = msgInput.value.trim();
  const dateValue = dateInput.value;
  if (!message) {
    setStatus('createStatus', 'Write a message first', 'err');
    return;
  }
  if (!dateValue) {
    setStatus('createStatus', 'Choose an unlock date', 'err');
    return;
  }

  const unlockTimestamp = Math.floor(new Date(dateValue).getTime() / 1000);
  const nowSec = Math.floor(Date.now() / 1000);
  if (unlockTimestamp <= nowSec) {
    setStatus('createStatus', 'Unlock date must be at least 1 minute in future', 'err');
    return;
  }

  try {
    setStatus('createStatus', '✍️ Preparing transaction...');
    // Estimate gas or just send
    const tx = await signerContract.createCapsule(message, unlockTimestamp);
    setStatus('createStatus', '⏳ Sealing capsule on Base... (tx: ' + tx.hash.slice(0,10) + '...)');
    const receipt = await tx.wait();
    
    // Try to parse CapsuleCreated event to get ID
    let newCapsuleId = null;
    if (receipt.logs && receipt.logs.length > 0) {
      for (const log of receipt.logs) {
        try {
          const parsedLog = signerContract.interface.parseLog(log);
          if (parsedLog && parsedLog.name === 'CapsuleCreated') {
            newCapsuleId = parsedLog.args[0]?.toString(); // id
            break;
          }
        } catch (e) { /* ignore */ }
      }
    }
    
    const idMsg = newCapsuleId ? ` Capsule #${newCapsuleId} sealed!` : ' Capsule sealed successfully!';
    setStatus('createStatus', '✓ ' + idMsg, 'ok');
    
    // Clear form
    msgInput.value = '';
    dateInput.value = '';
    charCountSpan.textContent = '0';
    
    // Refresh total capsules count
    await loadTotalCapsules();
    
    // Optional: show quick success indicator
    setTimeout(() => {
      if (createStatusDiv.textContent.includes('✓')) {
        setStatus('createStatus', 'Ready to create another capsule', '');
      }
    }, 4000);
  } catch (err) {
    console.error(err);
    let errorMsg = err.message || String(err);
    if (errorMsg.includes('user rejected')) errorMsg = 'Transaction rejected';
    else if (errorMsg.includes('insufficient funds')) errorMsg = 'Insufficient ETH for gas ⛽';
    else if (errorMsg.length > 100) errorMsg = errorMsg.slice(0, 100);
    setStatus('createStatus', `❌ ${errorMsg}`, 'err');
  }
}

// Read capsule: uses read-only contract or signerContract if available but read-only works anyway
async function readCapsuleById() {
  const idRaw = capsuleIdInput.value;
  if (idRaw === '') {
    capsuleResultDiv.innerHTML = `<div class="capsule-card"><p class="locked-placeholder">Enter a capsule ID</p></div>`;
    return;
  }
  const id = Number(idRaw);
  if (isNaN(id) || id < 0) {
    capsuleResultDiv.innerHTML = `<div class="capsule-card"><p class="locked-placeholder">Invalid ID</p></div>`;
    return;
  }
  
  // Use read-only contract (always available)
  let contractForRead = readOnlyContract;
  if (!contractForRead) {
    // fallback
    try {
      const fallbackProvider = new ethers.JsonRpcProvider('https://mainnet.base.org');
      contractForRead = new ethers.Contract(CONTRACT, ABI, fallbackProvider);
    } catch (e) {
      capsuleResultDiv.innerHTML = `<div class="capsule-card"><p class="locked-placeholder">Network error</p></div>`;
      return;
    }
  }
  
  try {
    // First check time until unlock
    const timeLeftBig = await contractForRead.timeUntilUnlock(id);
    const timeLeftSec = Number(timeLeftBig);
    
    if (timeLeftSec > 0) {
      const days = Math.floor(timeLeftSec / 86400);
      const hours = Math.floor((timeLeftSec % 86400) / 3600);
      const minutes = Math.floor((timeLeftSec % 3600) / 60);
      let countdownStr = `Opens in ${days}d ${hours}h ${minutes}m`;
      if (days === 0 && hours === 0 && minutes === 0 && timeLeftSec > 0) countdownStr = `Opens in ${timeLeftSec} seconds`;
      
      capsuleResultDiv.innerHTML = `
        <div class="capsule-card locked">
          <div class="capsule-meta">
            <span class="capsule-id">#${id}</span>
            <span class="badge locked">Locked</span>
          </div>
          <p class="locked-placeholder">🔒 This capsule is sealed until the future.</p>
          <div class="capsule-footer">
            <span class="countdown">${countdownStr}</span>
          </div>
        </div>`;
    } else {
      // Unlocked: fetch full details
      const [author, message, unlockTime] = await contractForRead.readCapsule(id);
      const unlockDate = new Date(Number(unlockTime) * 1000);
      const formattedDate = unlockDate.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
      const shortAuthor = author.slice(0,6) + '...' + author.slice(-4);
      
      capsuleResultDiv.innerHTML = `
        <div class="capsule-card unlocked">
          <div class="capsule-meta">
            <span class="capsule-id">#${id}</span>
            <span class="badge unlocked">Unlocked</span>
          </div>
          <p class="capsule-message">${escHtml(message)}</p>
          <div class="capsule-footer">
            <span>📜 by ${shortAuthor}</span>
            <span>🗓️ ${formattedDate}</span>
          </div>
        </div>`;
    }
  } catch (err) {
    console.warn("Read error", err);
    let errText = "Capsule not found or invalid ID";
    if (err.message && err.message.includes("execution reverted")) errText = "Capsule doesn't exist";
    else if (err.reason) errText = err.reason;
    capsuleResultDiv.innerHTML = `<div class="capsule-card"><p class="locked-placeholder">❌ ${errText}</p></div>`;
  }
}

// Real-time char counter
msgInput.addEventListener('input', () => {
  charCountSpan.textContent = msgInput.value.length;
});

// Set minimum datetime: now + 1 minute
function setMinDateTime() {
  const min = new Date(Date.now() + 60000); // 1 min from now
  const yyyy = min.getFullYear();
  const mm = String(min.getMonth() + 1).padStart(2, '0');
  const dd = String(min.getDate()).padStart(2, '0');
  const hh = String(min.getHours()).padStart(2, '0');
  const minMin = String(min.getMinutes()).padStart(2, '0');
  dateInput.min = `${yyyy}-${mm}-${dd}T${hh}:${minMin}`;
}
setMinDateTime();
// also update every minute optional but not needed

// Event listeners
connectBtn.addEventListener('click', async () => {
  await connectWallet();
});

createBtn.addEventListener('click', async () => {
  if (!signerContract) {
    setStatus('createStatus', 'Connect wallet first', 'err');
    return;
  }
  await createCapsule();
});

readBtn.addEventListener('click', async () => {
  await readCapsuleById();
});

// Allow enter key on capsule id input?
capsuleIdInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') readCapsuleById();
});

// Initialize background read-only provider on load
window.addEventListener('load', async () => {
  await initReadOnly();
  // If user already has a connected wallet from previous session? Not auto-connect for security.
  // But we detect if ethereum already selected and maybe prefill? Not required.
  // Also set up provider for eventual connection.
  if (window.ethereum) {
    // optional: detect if already connected but better to let user click connect.
    // We'll just keep ready.
  }
});
