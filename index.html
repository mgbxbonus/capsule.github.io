<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Capsule — Base</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js" integrity="sha512-hG6tLc9q8bFM5OQASDTJTJJg/wn8PP0PcayE3I2H1972/F7ktiSvWutAuQIkt4QUTIhiaFEnkrKea7XHUv1ugg==" crossorigin="anonymous"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#fff;color:#000;font-family:'Inter',sans-serif;padding:0 16px 80px}
  header{max-width:680px;margin:0 auto;padding:48px 0 40px;border-bottom:1px solid #DDE3E9}
  .logo{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;color:#787878}
  .logo span{color:#0000FF;font-weight:700}
  h1{font-family:'Space Mono',monospace;font-size:clamp(32px,6vw,52px);letter-spacing:-.03em;font-weight:700}
  h1 em{color:#0000FF;font-style:normal}
  .tagline{color:#787878;margin-top:12px;font-size:15px;line-height:1.6}
  .btn{font-family:'Space Mono',monospace;padding:10px 22px;border-radius:999px;cursor:pointer;border:none;font-size:12px;transition:background .15s}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-primary{background:#0000FF;color:#fff}
  .btn-primary:hover:not(:disabled){background:#0000CC}
  .btn-ghost{background:transparent;border:1.5px solid #000;color:#000}
  .btn-ghost:hover{background:#DDE3E9}
  .wallet-addr{font-family:'Space Mono',monospace;background:#DDE3E9;color:#000;padding:6px 14px;border-radius:999px;font-size:11px}
  main{max-width:680px;margin:40px auto 0}
  .form-card{background:#fff;border:1.5px solid #DDE3E9;border-radius:8px;padding:24px;margin-bottom:40px}
  textarea,input{background:#F5F5F5;border:1.5px solid #DDE3E9;border-radius:6px;color:#000;padding:12px;width:100%;font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .15s}
  textarea{resize:vertical;min-height:100px;line-height:1.6}
  textarea::placeholder,input::placeholder{color:#787878}
  textarea:focus,input:focus{border-color:#0000FF}
  input[type="number"]{background:#fff;border:1.5px solid #000;font-family:'Space Mono',monospace;-moz-appearance:textfield}
  input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  input[type="datetime-local"]{color-scheme:light}
  .date-row{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:12px}
  .status{margin-top:14px;font-size:12px;color:#787878;font-family:'Space Mono',monospace}
  .status.ok{color:#007700}
  .status.err{color:#CC0000}
  .capsule-card{border:1.5px solid #DDE3E9;border-radius:8px;padding:20px;margin-bottom:12px;background:#fff;position:relative;overflow:hidden}
  .capsule-card.locked{border-color:#0000FF;background:#F0F0FF}
  .capsule-card.unlocked{border-color:#A7E66B;background:#F5FFF0}
  .badge{font-size:9px;padding:3px 10px;border-radius:999px;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.1em}
  .badge.locked{background:#0000FF;color:#fff}
  .badge.unlocked{background:#A7E66B;color:#000}
  .capsule-footer{display:flex;justify-content:space-between;font-size:11px;color:#787878;margin-top:12px;font-family:'Space Mono',monospace}
  .network-warn{background:#FFF0F0;border:1.5px solid #CC0000;border-radius:8px;padding:12px;color:#CC0000;display:none;margin-bottom:20px;font-family:'Space Mono',monospace;font-size:12px}
</style>
</head>
<body>
<header>
  <div class="logo">On-chain · <span>Base Mainnet</span> · 0x36A9...08e69</div>
  <h1>Time<br><em>Capsule</em></h1>
  <p class="tagline">Write a message. Set a date. It stays sealed until then — forever on Base.</p>
  <div class="connect-bar">
    <button class="btn btn-primary" id="connectBtn">Connect Wallet</button>
    <div class="wallet-addr" id="walletAddr" style="display:none"></div>
  </div>
</header>

<main>
  <div class="network-warn" id="networkWarn">⚠ Switch to Base Mainnet (chain 8453)</div>
  <div class="form-card">
    <textarea id="msgInput" placeholder="Your message to the future..." maxlength="1000"></textarea>
    <div class="date-row">
      <input type="datetime-local" id="dateInput">
      <button class="btn btn-primary" id="createBtn" disabled>Seal →</button>
    </div>
    <div class="status" id="createStatus"></div>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:20px">
    <input type="number" id="capsuleIdInput" placeholder="Capsule ID" style="flex:1">
    <button class="btn btn-ghost" id="readBtn">Read</button>
  </div>
  <div id="totalBadge" style="font-size:12px;margin-bottom:16px"></div>
  <div id="capsuleResult"></div>
</main>

<script>
(function waitForEthers() {
  if (typeof ethers !== 'undefined') startApp();
  else setTimeout(waitForEthers, 100);
})();

async function startApp() {
  const CONTRACT = "0x36A9BFfc6116030459C7E9EE69d559f74BA08e69";
  const ABI = [
    "function createCapsule(string _message, uint256 _unlockTime) external returns (uint256)",
    "function readCapsule(uint256 _id) external view returns (address, string, uint256)",
    "function timeUntilUnlock(uint256 _id) external view returns (uint256)",
    "function totalCapsules() external view returns (uint256)",
    "event CapsuleCreated(uint256 indexed id, address indexed author, uint256 unlockTime)"
  ];
  const BASE_CHAIN_ID = 8453;
  const RPC_LIST = ["https://mainnet.base.org", "https://base.llamarpc.com", "https://base.publicnode.com"];

  let signerContract = null;
  let readContract = null;

  const connectBtn = document.getElementById('connectBtn');
  const walletAddr = document.getElementById('walletAddr');
  const createBtn = document.getElementById('createBtn');
  const msgInput = document.getElementById('msgInput');
  const dateInput = document.getElementById('dateInput');
  const createStatus = document.getElementById('createStatus');
  const readBtn = document.getElementById('readBtn');
  const capsuleIdInput = document.getElementById('capsuleIdInput');
  const capsuleResult = document.getElementById('capsuleResult');
  const totalBadge = document.getElementById('totalBadge');
  const networkWarn = document.getElementById('networkWarn');

  function setStatus(msg, type = '') {
    createStatus.textContent = msg;
    createStatus.className = 'status ' + type;
  }

  function formatDate(ts) {
    const d = new Date(ts * 1000);
    const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return m[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  async function initReadContract() {
    for (const rpc of RPC_LIST) {
      try {
        const provider = new ethers.JsonRpcProvider(rpc);
        const contract = new ethers.Contract(CONTRACT, ABI, provider);
        await contract.totalCapsules();
        readContract = contract;
        return true;
      } catch(e) {}
    }
    return false;
  }

  async function loadTotal() {
    if (!readContract) return;
    try {
      const total = await readContract.totalCapsules();
      totalBadge.innerHTML = `📦 Total capsules: <strong>${total.toString()}</strong>`;
    } catch(e) { totalBadge.innerHTML = `📦 Total capsules: —`; }
  }

  async function switchToBase() {
    if (!window.ethereum) return false;
    try {
      await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x2105' }] });
      networkWarn.style.display = 'none';
      return true;
    } catch(e) {
      if (e.code === 4902) {
        await window.ethereum.request({ method: 'wallet_addEthereumChain', params: [{
          chainId: '0x2105', chainName: 'Base Mainnet', nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
          rpcUrls: ['https://mainnet.base.org'], blockExplorerUrls: ['https://basescan.org']
        }]});
        networkWarn.style.display = 'none';
        return true;
      }
      return false;
    }
  }

  async function connectWallet() {
    if (!window.ethereum) return setStatus('MetaMask not found', 'err');
    try {
      const provider = new ethers.BrowserProvider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      let signer = await provider.getSigner();
      let network = await provider.getNetwork();
      if (Number(network.chainId) !== BASE_CHAIN_ID) {
        networkWarn.style.display = 'block';
        const ok = await switchToBase();
        if (!ok) return setStatus('Switch to Base Mainnet', 'err');
        const newProvider = new ethers.BrowserProvider(window.ethereum);
        signer = await newProvider.getSigner();
      }
      networkWarn.style.display = 'none';
      signerContract = new ethers.Contract(CONTRACT, ABI, signer);
      const addr = await signer.getAddress();
      walletAddr.textContent = addr.slice(0,6)+'...'+addr.slice(-4);
      walletAddr.style.display = 'block';
      connectBtn.style.display = 'none';
      createBtn.disabled = false;
      setStatus('Ready to seal', 'ok');
      readContract = new ethers.Contract(CONTRACT, ABI, signer);
      window.ethereum.on('accountsChanged', () => location.reload());
      window.ethereum.on('chainChanged', () => location.reload());
      await loadTotal();
    } catch(e) {
      setStatus(e.message?.slice(0,80) || 'Connection failed', 'err');
    }
  }

  async function createCapsule() {
    if (!signerContract) return setStatus('Connect wallet first', 'err');
    const msg = msgInput.value.trim();
    const dateVal = dateInput.value;
    if (!msg) return setStatus('Enter a message', 'err');
    if (!dateVal) return setStatus('Select unlock date', 'err');
    const unlockTime = Math.floor(new Date(dateVal).getTime() / 1000);
    if (unlockTime <= Math.floor(Date.now()/1000)) return setStatus('Date must be in future', 'err');
    try {
      setStatus('Confirm in MetaMask...');
      const tx = await signerContract.createCapsule(msg, unlockTime);
      setStatus('Tx: ' + tx.hash.slice(0,10) + '... waiting');
      const receipt = await tx.wait();
      let newId = '?';
      for (const log of receipt.logs) {
        try {
          const parsed = signerContract.interface.parseLog(log);
          if (parsed?.name === 'CapsuleCreated') { newId = parsed.args[0].toString(); break; }
        } catch(e) {}
      }
      setStatus('Capsule #' + newId + ' sealed!', 'ok');
      msgInput.value = '';
      dateInput.value = '';
      await loadTotal();
    } catch(e) {
      let errMsg = e.message || String(e);
      if (errMsg.includes('user rejected')) errMsg = 'Transaction rejected';
      else if (errMsg.includes('insufficient funds')) errMsg = 'Insufficient ETH for gas';
      setStatus(errMsg.slice(0,90), 'err');
    }
  }

  async function readCapsule() {
    const id = capsuleIdInput.value;
    if (id === '') return;
    if (!readContract) {
      if (!await initReadContract()) {
        capsuleResult.innerHTML = '<div class="capsule-card"><p>Cannot connect to blockchain</p></div>';
        return;
      }
    }
    try {
      const timeLeft = await readContract.timeUntilUnlock(BigInt(id));
      if (timeLeft > 0n) {
        const seconds = Number(timeLeft);
        const days = Math.floor(seconds / 86400);
        const hours = Math.floor((seconds % 86400) / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        capsuleResult.innerHTML = `
          <div class="capsule-card locked">
            <div><span class="badge locked">Locked</span> <span style="font-size:12px;color:#787878;font-family:'Space Mono',monospace">#${id}</span></div>
            <div class="capsule-footer">Opens in ${days}d ${hours}h ${mins}m</div>
          </div>`;
      } else {
        const [author, message, unlockTime] = await readContract.readCapsule(BigInt(id));
        const date = formatDate(Number(unlockTime));
        const card = document.createElement('div');
        card.className = 'capsule-card unlocked';
        card.innerHTML = `
          <div><span class="badge unlocked">Unlocked</span> <span style="font-size:12px;color:#787878;font-family:'Space Mono',monospace">#${id}</span></div>
          <p class="msg-text" style="margin:12px 0;font-size:14px;line-height:1.7"></p>
          <div class="capsule-footer"><span>${author.slice(0,6)}...${author.slice(-4)}</span><span>${date}</span></div>`;
        card.querySelector('.msg-text').textContent = message;
        capsuleResult.innerHTML = '';
        capsuleResult.appendChild(card);
      }
    } catch(e) {
      const card = document.createElement('div');
      card.className = 'capsule-card';
      const p = document.createElement('p');
      p.style.color = '#787878';
      p.textContent = e.reason || 'Capsule not found';
      card.appendChild(p);
      capsuleResult.innerHTML = '';
      capsuleResult.appendChild(card);
    }
  }

  // UI events
  document.getElementById('dateInput').min = new Date(Date.now()+60000).toISOString().slice(0,16);
  connectBtn.onclick = connectWallet;
  createBtn.onclick = createCapsule;
  readBtn.onclick = readCapsule;
  capsuleIdInput.onkeypress = (e) => e.key === 'Enter' && readCapsule();

  if (await initReadContract()) await loadTotal();
  else totalBadge.innerHTML = '📦 Total capsules: (RPC offline)';
}
</script>
</body>
</html>
